<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradeCore</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050816;
    --card: rgba(20, 30, 55, 0.55);
    --border: rgba(255,255,255,0.06);
    --text: #e6edf3;
    --muted: #8b9bb4;
    --accent: #4cc9f0;
    --green: #22c55e;
    --red: #ef4444;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 10%, #0f1b3d, #020617);
    color: var(--text);
}

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    padding: 30px;
}

.sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.card {
    background: var(--card);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
}

h1 { color: var(--accent); }
h2 { color: var(--muted); }

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #020617;
    color: white;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.btn-primary {
    background: linear-gradient(135deg, #4cc9f0, #4895ef);
}

.btn-sell {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
    color: white;
}

.main {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.price-box {
    font-size: 22px;
}

.status {
    margin-top: 10px;
    font-size: 13px;
}

.status.success { color: var(--green); }
.status.error { color: var(--red); }

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="card">
<h1>TradeCore</h1>
</div>

<div class="card">
<h2>Create User</h2>
<input id="userId" placeholder="Trader ID">
<button class="btn-primary" onclick="createUser()">Create</button>
<div id="userStatus" class="status"></div>
</div>

<div class="card">
<h2>Market</h2>
<select id="symbolSelect" onchange="changeSymbol()">
<option>AAPL</option>
<option>MSFT</option>
<option>GOOG</option>
<option>TSLA</option>
</select>

<div class="price-box">
$ <span id="price">--</span>
</div>
</div>

<div class="card">
<h2>Place Order</h2>
<input id="quantity" placeholder="Quantity">
<input id="traderId" placeholder="Trader ID">

<button class="btn-primary" onclick="placeOrder('BUY')">BUY</button>
<button class="btn-sell" onclick="placeOrder('SELL')">SELL</button>

<div id="orderStatus" class="status"></div>
</div>

<div class="card">
<h2>Portfolio</h2>
<input id="portfolioId" placeholder="Trader ID">
<button class="btn-primary" onclick="loadPortfolio()">Load</button>

<div id="portfolioOutput"></div>
<div id="portfolioStatus" class="status"></div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h2>Live Trades</h2>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Qty</th>
<th>Price</th>
<th>Buyer</th>
<th>Seller</th>
</tr>
</thead>
<tbody id="trades"></tbody>
</table>

</div>

</div>

</div>

<script>

let currentSymbol = "AAPL";

function changeSymbol() {
    currentSymbol = document.getElementById("symbolSelect").value;
}

const ws = new WebSocket("ws://localhost:8080/ws/market");

ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === "PRICE_TICK") {
        if (msg.price.symbol === currentSymbol) {
            document.getElementById("price").textContent =
                msg.price.price.toFixed(2);
        }
    }

    if (msg.type === "TRADE_EXECUTED") {
        const t = msg.trade;
        if (t.symbol !== currentSymbol) return;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${t.symbol}</td>
            <td>${t.quantity}</td>
            <td>$${t.price.toFixed(2)}</td>
            <td style="color:#22c55e">${t.buyerId}</td>
            <td style="color:#ef4444">${t.sellerId}</td>
        `;

        document.getElementById("trades").prepend(row);
    }
};

// ================= USER =================

async function createUser() {
    const id = document.getElementById("userId").value;

    const res = await fetch('/users/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ id })
    });

    const status = document.getElementById("userStatus");

    if (!res.ok) {
        const data = await res.json();
        status.textContent = data.error;
        status.className = "status error";
    } else {
        status.textContent = "User created successfully";
        status.className = "status success";
    }
}

// ================= ORDER =================

async function placeOrder(side) {
    const quantity = parseInt(document.getElementById("quantity").value);
    const traderId = document.getElementById("traderId").value;

    const res = await fetch('/orders/market', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            symbol: currentSymbol,
            quantity,
            side,
            traderId
        })
    });

    const status = document.getElementById("orderStatus");

    if (!res.ok) {
        const data = await res.json();
        status.textContent = data.error;
        status.className = "status error";
    } else {
        status.textContent = side + " order placed successfully";
        status.className = "status success";
    }
}

// ================= PORTFOLIO =================

async function loadPortfolio() {
    const id = document.getElementById("portfolioId").value;

    const res = await fetch(`/portfolio/${id}`);
    const status = document.getElementById("portfolioStatus");

    if (!res.ok) {
        const data = await res.json();
        status.textContent = data.error;
        status.className = "status error";
        return;
    }

    const data = await res.json();

    let html = `
        <strong>Cash:</strong> $${data.cashBalance.toFixed(2)}<br><br>
        <strong>Holdings:</strong><br>
    `;

    const positions = data.positions;

    if (Object.keys(positions).length === 0) {
        html += `<span style="color:#94a3b8">No holdings</span>`;
    } else {
        for (let sym in positions) {
            html += `
                <div style="display:flex;justify-content:space-between">
                    <span>${sym}</span>
                    <span>${positions[sym]} shares</span>
                </div>
            `;
        }
    }

    document.getElementById("portfolioOutput").innerHTML = html;
    status.textContent = "Portfolio loaded";
    status.className = "status success";
}

</script>

</body>
</html>
